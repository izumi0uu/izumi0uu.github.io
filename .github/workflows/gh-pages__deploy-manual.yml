name: Deploy to GitHub Pages manually

on:
  push:
    branches:
      - "disabled-main"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - "disabled-main"
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

# set env vars in Github settings here
env:
  SITE_URL: "https://izumi0uu.github.io"
  PLAUSIBLE_SCRIPT_URL: "https://plausible.arm1.izumi0uu.com/js/script.js"
  PLAUSIBLE_DOMAIN: "izumi0uu.github.io"

jobs:
  release-gates:
    uses: ./.github/workflows/test-gates.yml
    permissions:
      contents: read
    with:
      run_e2e: true

  build-manual:
    needs: release-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print commit id, message and tag
        run: |
          git show -s --format='%h %s'
          echo "github.ref -> ${{ github.ref }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build izumi0uu.github.io
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build-manual
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
